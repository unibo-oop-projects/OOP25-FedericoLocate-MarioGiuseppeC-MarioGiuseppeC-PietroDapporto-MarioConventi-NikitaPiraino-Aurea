      text: "I absolutely agree"
      effects:
        - parameter: STUDENTS
          delta: 9
        - parameter: PROFESSORS
          delta: -20

  - id: stu_cafeteria_prices
    character: STUDENT
    description: "Campus cafeteria VOLUME prices have increased sharply this semester."
    refusal:
      text: "Prices stay unchanged"
      effects:
        - parameter: STUDENTS
          delta: -9
        - parameter: FINANCES
          delta: 10
    approval:
      text: "Introduce discounts"
      effects:
        - parameter: STUDENTS
          delta: 9
        - parameter: PROFESSORS
          delta: 6

  - id: stu_support_palestine
    character: STUDENT
