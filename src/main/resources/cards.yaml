    character: STUDENT
    description: "The multipurpose room is too small: when you study you can't breathe."
    refusal:
      text: "The students must study at home"
      effects:
        - parameter: STUDENTS
          delta: -10
        - parameter: FINANCES
          delta: 5
    approval:
      text: "Ok, let's make it bigger"
      effects:
        - parameter: STUDENTS
          delta: 10
        - parameter: FINANCES
          delta: -9

  - id: stu_security_checks #folllow up
    character: STUDENT
    description: "Security checks at campus entrances are slowing down student access."
    refusal:
      text: "Reduce the controls"
      effects:
        - parameter: STUDENTS
          delta: 6
        - parameter: REPUTATION
          delta: -3
    approval:
      text: "Maintain strict checks"
      effects:
        - parameter: STUDENTS
          delta: -7
        - parameter: REPUTATION
          delta: 5

  - id: mum_campus_safety
    character: MUM
    description: "Many of us are concerned about campus safety and request additional security measures. Will you invest in it?"
    refusal:
      text: "No, current measures are sufficient"
      effects:
        - parameter: REPUTATION
          delta: -7
        - parameter: FINANCES
          delta: 3
    approval:
      text: "Yes, student safety is a priority"
      effects:
        - parameter: REPUTATION
          delta: 7
        - parameter: FINANCES
          delta: -3

  - id: businessman_partenship_project
    character: BUSINESSMAN
