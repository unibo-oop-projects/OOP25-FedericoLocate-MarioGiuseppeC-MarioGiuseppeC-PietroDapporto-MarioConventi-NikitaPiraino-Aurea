      effects:
        - parameter: PROFESSORS
          delta: 7
        - parameter: FINANCES
          delta: -7
    approval:
      text: "Yes, funding is essential for growth"
      effects:
        - parameter: FINANCES
          delta: 7
        - parameter: REPUTATION
          delta: -3

  - id: prof_research_launch
    character: PROFESSOR
    description: "Rector, the newly funded research project has started, but costs are exceeding expectations. Additional funding is required to keep it running. What should we do?"
    refusal:
      text: "We cannot allocate more funds"
      effects:
        - parameter: PROFESSORS
          delta: -5
        - parameter: REPUTATION
          delta: -3
    approval:
      text: "Approve additional funding"
      effects:
        - parameter: PROFESSORS
          delta: 4
        - parameter: FINANCES
          delta: -5
