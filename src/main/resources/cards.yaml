      effects:
        - parameter: STUDENTS
          delta: 10
        - parameter: FINANCES
          delta: -11
    approval:
      text: "Cut the courses"
      effects:
        - parameter: STUDENTS
          delta: -11
        - parameter: FINANCES
          delta: 7

