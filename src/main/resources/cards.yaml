      text: "Enforce stricter rules"
      effects:
        - parameter: STUDENTS
          delta: -8
        - parameter: REPUTATION
          delta: 3

  - id: stu_course_cuts
    character: STUDENT
    description: "Several elective courses may be removed to reduce costs."
    refusal:
