        - parameter: STUDENTS
          delta: 7
        - parameter: FINANCES
          delta: -9

  - id: stu_oop_useless
    character: STUDENT
    description: "The 2nd year students say that OOP course is useless."
    refusal:
      text: "They don't understand anything"
      effects:
        - parameter: STUDENTS
          delta: -7
        - parameter: REPUTATION
          delta: 8
