      effects:
        - parameter: STUDENTS
          delta: -7
        - parameter: FINANCES
          delta: 7
    approval:
      text: "You're right, we'll fix them"
      effects:
        - parameter: STUDENTS
          delta: 7
        - parameter: FINANCES
          delta: -10

  - id: stu_reduce_fees
    character: STUDENT
    description: "Many students can't afford to pay their tuition fees. Do you think you can lower them?"
    refusal:
      text: "No, I can't"
      effects:
        - parameter: STUDENTS
          delta: -8
        - parameter: REPUTATION
          delta: -7
    approval:
      text: "Yes for sure"
      effects:
        - parameter: STUDENTS
          delta: 10
        - parameter: FINANCES
          delta: -13

  - id: stu_gender_bathroom
    character: STUDENT
    description: "The campus needs third gender bathrooms."
    refusal:
      text: "Men and women are enough"
      effects:
        - parameter: STUDENTS
          delta: -18
        - parameter: FINANCES
          delta: 7
    approval:
      text: "Absolutely"
      effects:
        - parameter: STUDENTS
          delta: 10
        - parameter: REPUTATION
          delta: 11

  - id: stu_surprise_exams
    character: STUDENT
    description: "Some departments want to introduce surprise oral exams."
    refusal:
      text: "Students need preparation time"
      effects:
        - parameter: STUDENTS
          delta: 9
        - parameter: PROFESSORS
          delta: -4
    approval:
      text: "Allow surprise exams"
      effects:
        - parameter: STUDENTS
          delta: -10
